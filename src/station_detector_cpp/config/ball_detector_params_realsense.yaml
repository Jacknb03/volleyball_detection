# RealSense D455i RGB-D：对齐深度采样模式
# 启动: PIPELINE_MODE=realsense ./start_all.sh
ball_detector_node:
  ros__parameters:
    yolo:
      model_path: "model/best.onnx"
      model_type: "yolov8"
      conf_threshold: 0.18
      iou_threshold: 0.45
      device: "auto"
      volleyball_classes:
        - "volleyball"
        - "Volleyball"

    input:
      image_topic: "/camera/camera/color/image_raw"
      camera_info_topic: "/camera/camera/color/camera_info"

    position:
      mode: "depth"
      depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
      depth_max_stamp_delta_sec: 0.05
      depth_min_m: 0.3
      depth_max_m: 8.0
      depth_patch_radius: 2

    kalman:
      process_noise: 0.05
      measurement_noise: 50.0
      initial_uncertainty: 10.0
      max_missing_frames: 15

    detection:
      max_jump_distance: 100.0
      min_consistent_detections: 1
      max_detections: 3
      selection_method: "confidence"
      min_confidence: 0.18
      use_tracker: true
      h_ema_alpha: 0.3
      max_physical_speed: 25.0
      emergency_bypass: false

    trajectory:
      prediction_time: 0.5
      num_points: 10
      integration_dt: 0.01
      max_time: 5.0
      ground_z: 0.0

    world_frame_id: "odom"
    camera_frame_id: "camera_color_optical_frame"
    air_density: 1.225
    drag_coefficient: 0.47

    volleyball:
      real_radius: 0.105
      diameter: 0.21
      mass_kg: 0.27
      min_depth: 0.2
      max_depth: 8.0

    debug:
      enable: true
      show_fps: true
      draw_trajectory: true
