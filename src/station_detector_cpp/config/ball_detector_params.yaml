ball_detector_node:
  ros__parameters:
    yolo:
      # 这里给一个“默认占位路径”。实际运行时建议通过 launch 或命令行覆盖：
      # ros2 launch station_detector_cpp yolo_cpp_video.launch.py model_path:=/abs/path/to/best.onnx
      model_path: "model/best.onnx"
      model_type: "yolov8"
      conf_threshold: 0.05
      iou_threshold: 0.45
      device: "auto"
      volleyball_classes: 
        - "volleyball"
        - "Volleyball"

    kalman:
      process_noise: 0.05
      measurement_noise: 50.0
      initial_uncertainty: 10.0
      max_missing_frames: 15

    detection:
      max_jump_distance: 100.0
      min_consistent_detections: 1
      max_detections: 3
      selection_method: "confidence"
      min_confidence: 0.25
      use_tracker: true
      h_ema_alpha: 0.3
      max_physical_speed: 25.0

    trajectory:
      prediction_time: 0.5
      num_points: 10
      integration_dt: 0.01
      max_time: 5.0
      ground_z: 0.0

    # 坐标系与物理参数
    world_frame_id: "odom"
    camera_frame_id: "camera_optical_frame"
    air_density: 1.225
    drag_coefficient: 0.47

    volleyball:
      real_radius: 0.105
      diameter: 0.21
      mass_kg: 0.27
      min_depth: 0.2
      max_depth: 40.0

    debug:
      enable: true
      show_fps: true
      draw_trajectory: true