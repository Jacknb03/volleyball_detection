# =============================================================================
# 启动配置 — 改这里即可，然后直接 ./start_all.sh
# 命令行仍可临时覆盖，例如: YOLO_DEVICE=cpu ./start_all.sh
# =============================================================================

# 深度相机开关
#   false → 本地视频 + bbox 估深（开发机调试）
#   true  → RealSense D455i + RGB-D 深度（插相机后改 true）
USE_REALSENSE=true

# YOLO 推理设备: auto | cpu | cuda（工控机无显卡请用 cpu）
YOLO_DEVICE=cpu

# 视频模式（USE_REALSENSE=false 时生效）
# 留空则用默认 test.mp4
VIDEO_PATH=
FRAME_RATE=15.0

# 模型路径（留空用默认 best.onnx）
MODEL_PATH=
